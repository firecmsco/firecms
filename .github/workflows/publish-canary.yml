name: Publish Canary Packages

on:
  push:
    branches:
      - canary

concurrency:
  group: canary-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Set canary version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BASE_VERSION=$(node -p "require('./lerna.json').version")
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"
          echo "CANARY_VERSION=$CANARY_VERSION" >> $GITHUB_ENV
          echo "Publishing canary version: $CANARY_VERSION"

          # Update all package versions without creating git tags or commits
          npx lerna version "$CANARY_VERSION" --no-git-tag-version --no-push --yes

          # Commit version changes locally so lerna publish doesn't complain
          # (this commit is never pushed back)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: canary version $CANARY_VERSION" --no-verify

      - name: Publish to npm
        run: |
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              IS_PRIVATE=$(node -e "const p=require('./$dir/package.json'); console.log(p.private === true)")
              if [ "$IS_PRIVATE" != "true" ]; then
                PKG_NAME=$(node -e "const p=require('./$dir/package.json'); console.log(p.name)")
                echo "📦 Publishing $PKG_NAME..."
                (cd "$dir" && npm publish --provenance --access public --tag canary) || {
                  echo "⚠️  Failed to publish $PKG_NAME with provenance, retrying without..."
                  (cd "$dir" && npm publish --access public --tag canary)
                }
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "### 🐤 Canary Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ env.CANARY_VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install @firecms/core@canary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
